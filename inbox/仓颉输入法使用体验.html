<h2 id="orgfa8704c">Main</h2>
<div class="outline-text-2" id="text-orgfa8704c">
<p>
贯穿字形需要优先取独立的笔画，比如“费”的编码是 <code>lnbo</code> 。
</p>

<p>
也有遇到一些难以理解的字形，比如：
</p>
<ul class="org-ul">
<li>解 nbshq</li>
<li>线 vmij</li>
<li>遇 ywlb</li>
<li>替 qoa</li>
</ul>


<p>
为了规避重码，有些时候不得不使用一些繁体字，比如：
</p>
<ul class="org-ul">
<li>東，殺</li>
<li>文，頭，達</li>
<li>京，點</li>
<li>沉，觀</li>
</ul>


<p>
没想到使用形码输入法的代价这么大，早知道一开始就不应该碰的，应该好好记忆拼音的。
</p>
